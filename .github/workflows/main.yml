name: CI Java (Eclipse project)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile all Java sources (search repo)
        run: |
          mkdir -p out
          find . -name "*.java" > sources.txt
          echo "Java files found:" && wc -l sources.txt
          test -s sources.txt
          javac -encoding UTF-8 -d out @sources.txt
